  <!-- HEADER -->
  <header>
    <div class="logo">🏁 F1 WORLD</div>
    <nav>
      <a href="index-en.html" class="active">Home</a>
      <a href="equipes-en.html">Teams</a>

      <a href="media-en.html">Media</a>
      <a href="contact-en.html">Contact</a>
      <a href="contact.html" class="lang-switcher">EN/FR</a>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h1>Contact Us</h1>
      <p class="hero-subtitle">We are here to listen to any questions or suggestions you may have</p>
    </div>
    <div class="hero-visual">
      <div class="animated-bg"></div>
    </div>
  </section>

  <!-- CONTACT SECTION -->
  <section class="contact-section">
    <div class="contact-container">
      <div class="contact-info">
        <h2>Get in Touch</h2>
        <div class="info-cards">
          <div class="info-card">
            <div class="info-icon">📧</div>
            <h3>Email</h3>
            <p>roudergue.nathan@gmail.com</p>
          </div>
          <div class="info-card">
            <div class="info-icon">📱</div>
            <h3>Phone</h3>
            <p>+33 1 23 45 67 89</p>
          </div>
          <div class="info-card">
            <div class="info-icon">📍</div>
            <h3>Location</h3>
            <p>Aix-en-Provence, France</p>
          </div>
        </div>
      </div>

      <form class="contact-form">
        <div class="form-group">
          <input type="text" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <input type="email" placeholder="Your email" required>
        </div>

        <div class="form-group">
          <input type="tel" placeholder="Your phone">
        </div>

        <div class="form-group">
          <textarea placeholder="Your message" rows="6" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-content">
      <p>&copy; 2026 F1 World - All rights reserved</p>
